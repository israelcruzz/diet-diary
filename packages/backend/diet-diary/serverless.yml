org: israelcruzworktest
service: diet-diary

plugins:
  - serverless-offline

package:
  individually: true

build:
  esbuild:
    configFile: ./esbuild.config.mjs

custom:
  cognito:
    PoolName: ${self:service}-${self:provider.stage}-user-pool

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  memorySize: 128
  timeout: 10
  architecture: arm64
  stage: ${opt:stage, 'dev'}
  environment:
    MAIN_TABLE_NAME: ${self:service}-${self:provider.stage}-main-table
    USER_POOL_ID: !Ref UserPool
    USER_POOL_CLIENT_ID: !Ref UserPoolClient
    NODE_ENV: ${env:NODE_ENV}
  httpApi:
    authorizers:
      CognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !GetAtt UserPool.ProviderURL
        audience:
          - !Ref UserPoolClient

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource:
            - !GetAtt MainTable.Arn
            - !Sub "${MainTable.Arn}/index/*"
        - Effect: Allow
          Action: cognito-idp:AdminDeleteUser
          Resource: !GetAtt UserPool.Arn

functions:
  hello:
    handler: src/main/functions/helloHandler.handler
    events:
      - httpApi:
          path: /
          method: post
          authorizer: CognitoAuthorizer

  signUp:
    handler: src/main/functions/auth/signUpHandler.handler
    events:
      - httpApi:
          path: /auth/sign-up
          method: post

  signIn:
    handler: src/main/functions/auth/signInHandler.handler
    events:
      - httpApi:
          path: /auth/sign-in
          method: post

  forgotPassword:
    handler: src/main/functions/auth/forgotPasswordHandler.handler
    events:
      - httpApi:
          path: /auth/forgot-password
          method: post

  confirmForgotPassword:
    handler: src/main/functions/auth/confirmForgotPasswordHandler.handler
    events:
      - httpApi:
          path: /auth/confirm-forgot-password
          method: post

  refreshToken:
    handler: src/main/functions/auth/refreshTokenHandler.handler
    events:
      - httpApi:
          path: /auth/refresh-token
          method: post

  cognitoPreSignUpTrigger:
    handler: src/main/functions/auth/cognito/preSignUpTrigger.handler
    events:
      - cognitoUserPool:
          pool: ${self:custom.cognito.PoolName}
          trigger: PreSignUp
          existing: true
          forceDeploy: true

  cognitoCustomEmailTrigger:
    handler: src/main/functions/auth/cognito/customEmailTrigger.handler
    events:
      - cognitoUserPool:
          pool: ${self:custom.cognito.PoolName}
          trigger: CustomMessage
          existing: true
          forceDeploy: true

resources:
  Resources:
    UserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${self:provider.stage}-user-pool
        UsernameAttributes:
          - email
        UsernameConfiguration:
          CaseSensitive: true
        MfaConfiguration: OFF
        AccountRecoverySetting:
          RecoveryMechanisms:
            - Name: verified_email
              Priority: 1
        AdminCreateUserConfig:
          AllowAdminCreateUserOnly: false
        # DeletionProtection: ACTIVE
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: true

    UserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${self:provider.stage}-UserPoolClient
        UserPoolId: !Ref UserPool
        # GenerateSecret: true
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        TokenValidityUnits:
          AccessToken: minutes
          RefreshToken: days
        AccessTokenValidity: 5
        RefreshTokenValidity: 7

    MainTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-main-table
        BillingMode: PROVISIONED
        DeletionProtectionEnabled: false
        # PointInTimeRecoverySpecification:
        #   PointInTimeRecoveryEnabled: false
        #   RecoveryPeriodInDays: 30
        ProvisionedThroughput:
          ReadCapacityUnits: 1
          WriteCapacityUnits: 1
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
          - AttributeName: GSI2PK
            AttributeType: S
          - AttributeName: GSI2SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            Projection:
              ProjectionType: ALL
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            ProvisionedThroughput:
              ReadCapacityUnits: 1
              WriteCapacityUnits: 1
          - IndexName: GSI2
            Projection:
              ProjectionType: ALL
            KeySchema:
              - AttributeName: GSI2PK
                KeyType: HASH
              - AttributeName: GSI2SK
                KeyType: RANGE
            ProvisionedThroughput:
              ReadCapacityUnits: 1
              WriteCapacityUnits: 1
